<!DOCTYPE html>
<html>
    <head>
        <title>Chuckles McGiggles</title>
    </head>
    <body>
        <button onclick="toggleAbout()"><h1>Chuckles McGiggles</h1></button>
        <hr>
        <img id="img" src="./charlieMeyer.jpeg">
        <p id="about"></p>
    </body>
    <style>
        body {
            background-color: #111;
            color: white;
        }
        button {
            background-color: transparent;
            border: none;
            color: white;
            cursor: pointer;
        }
        .about {
            display: none;
        }
    </style>
    <script>
        let toggle = false;
        const img = document.getElementById("img");
        const about = document.getElementById("about");

        function toggleAbout() {
            toggle = !toggle;

            if (toggle) {
                img.style.display = "none";
                about.style.display = "block";
                about.textContent = `Chuckles McGiggles (TheBigChucklesMcGiggles@charliemeyer.org) is the one, the only, Chuckles McGiggles. Chuckles McGiggles is the og 67 sailor. He sails on his very sexy boat, Ghost, which is a Farr 40. He sails in the Chicago Yacht Club Race to Mackinac by Wintrust every year and has been for the past 6 or 7 years. He is the creator of many memorable phrases like "It's Chill", "Big Chill", "Big Unforch", "It's Unforch",  "oo (subtle head nod)", "Yesss (Fist pull)", and many more. If he ever invites you to his house, he will make you play uno with him so be warned. His boat is very sexy by the way.`;
            } else {
                img.style.display = "block";
                about.style.display = "none";
            }
        }
    </script>
</html>
